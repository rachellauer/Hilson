<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake 🐍</title>
<style>
  body {
    margin: 0;
    background: #1e2a44;
    color: #ffffff;
    font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  h1 {
    margin: 16px 0 4px;
  }
  /* Step 6: the score shown at the top of the screen */
  #score {
    font-size: 24px;
    margin-bottom: 12px;
  }
  /* Step 1: the game window / grid */
  canvas {
    background: #0f1830;
    border: 6px solid #4caf50;
    border-radius: 8px;
  }
  #message {
    height: 28px;
    font-size: 20px;
    margin-top: 12px;
    color: #ffd54f;
  }
  .hint {
    color: #9fb3d1;
    font-size: 16px;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <h1>Snake 🐍</h1>
  <div id="score">Score: 0</div>
  <canvas id="game" width="600" height="600"></canvas>
  <div id="message"></div>
  <div class="hint">Use the arrow keys to steer. Press Space to start again.</div>

<script>
  // ----- Settings -----
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const messageEl = document.getElementById("message");

  const BOX = 20;                       // size of one grid square
  const COLS = canvas.width / BOX;       // how many squares across
  const ROWS = canvas.height / BOX;      // how many squares down
  const RASPBERRY_COUNT = 30;            // how many raspberries on the board at once
  const START_MOVE_MS = 200;             // the snake starts stepping every 200 ms
  const MIN_MOVE_MS = 60;                // but it never gets faster than this
  let moveMs = START_MOVE_MS;            // gets 5 ms faster with each raspberry eaten

  let snake, direction, nextDirection, apples, strawberry, score, gameOver;
  let frame = 0;       // counts renders, used to animate the flicking tongue
  let prevSnake = [];  // where each body square was before the last step
  let lastStep = null; // time of the last movement step (for smooth gliding)
  let renderT = 1;     // 0..1 progress between the last square and the next
  let particles = [];  // the flying pieces of the explosion
  let exploded = false; // true once the snake has hit a wall and blown up

  // ----- Step 2: start a snake in the middle of the grid -----
  function resetGame() {
    const midX = Math.floor(COLS / 2);
    const midY = Math.floor(ROWS / 2);
    snake = [{ x: midX, y: midY }];      // the snake is a list of squares
    prevSnake = snake.map(s => ({ ...s }));
    lastStep = null;
    direction = { x: 0, y: 0 };          // not moving until a key is pressed
    nextDirection = { x: 0, y: 0 };
    score = 0;
    gameOver = false;
    moveMs = START_MOVE_MS;              // back to the starting speed
    particles = [];
    exploded = false;
    strawberry = null;                   // cleared so placement starts fresh
    placeApples();
    strawberry = randomFreeSpot();       // the one special rainbow strawberry
    updateScore();
    messageEl.textContent = "";
  }

  // ----- Step 4: fill the board with raspberries in random empty spots -----
  function placeApples() {
    apples = [];
    for (let i = 0; i < RASPBERRY_COUNT; i++) {
      apples.push(randomFreeSpot());
    }
  }

  // is this square already taken by the snake, a raspberry, or the strawberry?
  function spotTaken(x, y) {
    if (snake.some(s => s.x === x && s.y === y)) return true;
    if (apples && apples.some(a => a.x === x && a.y === y)) return true;
    if (strawberry && strawberry.x === x && strawberry.y === y) return true;
    return false;
  }

  // find one empty square anywhere on the board
  function randomFreeSpot() {
    while (true) {
      const x = Math.floor(Math.random() * COLS);
      const y = Math.floor(Math.random() * ROWS);
      if (!spotTaken(x, y)) return { x, y };
    }
  }

  function updateScore() {
    scoreEl.textContent = "Score: " + score;
  }

  // ----- Step 3: steer the snake with the arrow keys -----
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp"    && direction.y === 0) nextDirection = { x: 0, y: -1 };
    if (e.key === "ArrowDown"  && direction.y === 0) nextDirection = { x: 0, y:  1 };
    if (e.key === "ArrowLeft"  && direction.x === 0) nextDirection = { x: -1, y: 0 };
    if (e.key === "ArrowRight" && direction.x === 0) nextDirection = { x:  1, y: 0 };
    if (e.key === " " && gameOver) resetGame();    // Space restarts
  });

  // ----- One movement step: move the snake exactly one square -----
  function step() {
    direction = nextDirection;
    if (direction.x === 0 && direction.y === 0) {
      prevSnake = snake.map(s => ({ ...s }));   // still waiting for the first key
      return;
    }

    // Where the snake's head moves next
    const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

    // ----- Step 7: game over if the snake hits a wall (BOOM!) -----
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      // blow up right where the head smacked the wall
      const bx = snake[0].x * BOX + BOX / 2 + direction.x * BOX / 2;
      const by = snake[0].y * BOX + BOX / 2 + direction.y * BOX / 2;
      explode(bx, by);
      return endGame();
    }
    // ----- Step 7: game over if the snake runs into itself -----
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return endGame();
    }

    // remember where everything was so we can glide smoothly to the new spot
    prevSnake = snake.map(s => ({ ...s }));

    snake.unshift(head);   // move the head forward

    const ateRaspberry = apples.findIndex(a => a.x === head.x && a.y === head.y);
    const ateStrawberry = strawberry && strawberry.x === head.x && strawberry.y === head.y;

    if (ateStrawberry) {
      // the special rainbow strawberry is worth 50 points!
      // (we keep the new head AND do not remove the tail, so the snake grows)
      score += 50;
      updateScore();
      strawberry = null;                    // it's a one-time treat — no replacement
    } else if (ateRaspberry !== -1) {
      // ----- Step 5: eating a raspberry makes the snake LONGER -----
      // (we keep the new head AND do not remove the tail, so it grows)
      score += 1;
      updateScore();
      moveMs = Math.max(MIN_MOVE_MS, moveMs - 5);   // 5 ms faster each raspberry
      apples[ateRaspberry] = randomFreeSpot();   // a fresh raspberry replaces the eaten one
    } else {
      snake.pop();         // no food eaten, so the tail follows along
    }
  }

  // ----- The render loop: runs ~60 times a second for smooth motion -----
  // Movement happens on a beat (every moveMs, which speeds up as the snake
  // eats), but we redraw every frame and glide the snake between squares so
  // it never looks choppy.
  function loop(now) {
    if (!gameOver) {
      if (lastStep === null) lastStep = now;
      // catch up on any movement steps that are due
      while (now - lastStep >= moveMs) {
        step();
        lastStep += moveMs;
        if (gameOver) break;
      }
    }
    renderT = gameOver ? 1 : Math.min(1, (now - lastStep) / moveMs);
    updateParticles();
    draw();
    requestAnimationFrame(loop);
  }

  // ----- Draw everything on the screen -----
  function draw() {
    frame++;

    // clear the board
    ctx.fillStyle = "#0f1830";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // draw the grid squares so you can see the spaces the snake moves through
    ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
    ctx.lineWidth = 1;
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath();
      ctx.moveTo(c * BOX, 0);
      ctx.lineTo(c * BOX, canvas.height);
      ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath();
      ctx.moveTo(0, r * BOX);
      ctx.lineTo(canvas.width, r * BOX);
      ctx.stroke();
    }

    // the raspberries (the food the snake eats)
    for (const a of apples) {
      drawRaspberry(a.x * BOX, a.y * BOX);
    }

    // the one special rainbow strawberry (worth 50 points)
    if (strawberry) {
      drawStrawberry(strawberry.x * BOX, strawberry.y * BOX);
    }

    // the snake — unless it has exploded, then show the flying pieces instead
    if (exploded) {
      drawParticles();
    } else {
      drawSnake();
    }
  }

  // A rainbow hue (0-359) that flows along the body and shifts over time,
  // so the snake is always changing colour. i = which body square.
  function snakeHue(i) {
    return (frame * 2 + i * 12) % 360;
  }

  // ----- Draw a detailed, shaded snake -----
  // The snake is drawn as a smooth tube that tapers from a fat head to a
  // thin tail, with layered shading (dark edges -> bright spine) so it looks
  // round instead of flat, plus scale texture and a head with eyes,
  // nostrils and a flicking forked tongue.
  function drawSnake() {
    // the center pixel of every body square, head first.
    // Each square glides from where it was (prevSnake) to where it is now,
    // using renderT (0..1), so the snake moves smoothly instead of jumping.
    const pts = snake.map((s, i) => {
      const p = prevSnake[i] || s;
      const gx = p.x + (s.x - p.x) * renderT;
      const gy = p.y + (s.y - p.y) * renderT;
      return { x: gx * BOX + BOX / 2, y: gy * BOX + BOX / 2 };
    });
    const n = pts.length;

    // body thickness at segment i: fat near the head, thin near the tail
    function widthAt(i) {
      const headW = BOX * 0.92;
      const tailW = BOX * 0.30;
      const t = n <= 1 ? 0 : i / (n - 1);
      return headW - (headW - tailW) * t;
    }

    ctx.lineJoin = "round";
    ctx.lineCap = "round";

    // soft shadow under the snake, for depth
    ctx.save();
    ctx.strokeStyle = "rgba(0,0,0,0.28)";
    for (let i = n - 1; i > 0; i--) {
      ctx.beginPath();
      ctx.lineWidth = widthAt(i);
      ctx.moveTo(pts[i].x + 2, pts[i].y + 3);
      ctx.lineTo(pts[i - 1].x + 2, pts[i - 1].y + 3);
      ctx.stroke();
    }
    ctx.restore();

    // layered body: dark edge -> mid colour -> bright spine highlight.
    // Each square's colour comes from the flowing rainbow hue, and drawing
    // thinner, lighter strokes on top of fatter, darker ones keeps the
    // rounded 3D tube look on every colour.
    const layers = [
      { w: 1.00, light: 28, sat: 85 },   // dark outer edge
      { w: 0.80, light: 48, sat: 90 },   // main colour
      { w: 0.52, light: 66, sat: 95 },   // lighter top
      { w: 0.22, light: 90, sat: 100 },  // glossy spine
    ];
    for (const layer of layers) {
      for (let i = n - 1; i > 0; i--) {
        ctx.beginPath();
        ctx.lineWidth = Math.max(1, widthAt(i) * layer.w);
        ctx.strokeStyle = `hsl(${snakeHue(i)}, ${layer.sat}%, ${layer.light}%)`;
        ctx.moveTo(pts[i].x, pts[i].y);
        ctx.lineTo(pts[i - 1].x, pts[i - 1].y);
        ctx.stroke();
      }
    }

    drawScales(pts, widthAt);
    drawHead(pts, widthAt, n);
  }

  // little chevron scales running down the snake's back
  function drawScales(pts, widthAt) {
    const n = pts.length;
    ctx.save();
    ctx.strokeStyle = "rgba(45,0,65,0.30)";
    ctx.lineWidth = 1;
    for (let i = n - 1; i > 0; i--) {
      const a = pts[i], b = pts[i - 1];
      let dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy) || 1;
      const ux = dx / len, uy = dy / len;     // direction along the body
      const px = -uy, py = ux;                // direction across the body
      const w = widthAt(i) * 0.40;
      for (let d = 0; d < len; d += 5) {
        const mx = a.x + ux * d, my = a.y + uy * d;
        ctx.beginPath();
        ctx.moveTo(mx - px * w, my - py * w);
        ctx.lineTo(mx + ux * 2.5, my + uy * 2.5);   // chevron points to the tail
        ctx.lineTo(mx + px * w, my + py * w);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // the snake's head: shaped, shaded, with eyes, nostrils and a tongue
  function drawHead(pts, widthAt, n) {
    const head = pts[0];

    // which way is the head facing?
    let fx = direction.x, fy = direction.y;
    if (fx === 0 && fy === 0) { fx = 1; fy = 0; }   // face right before the game starts

    ctx.save();
    ctx.translate(head.x, head.y);
    ctx.rotate(Math.atan2(fy, fx));   // now +x points the way the snake is going

    // the head uses the same flowing rainbow colour as the front of the body
    const headHue = snakeHue(0);
    // head shape (a little longer than it is wide)
    ctx.fillStyle = `hsl(${headHue}, 90%, 45%)`;
    ctx.beginPath();
    ctx.ellipse(1, 0, BOX * 0.72, BOX * 0.56, 0, 0, Math.PI * 2);
    ctx.fill();
    // lighter top of the head
    ctx.fillStyle = `hsl(${headHue}, 95%, 63%)`;
    ctx.beginPath();
    ctx.ellipse(-1, -2, BOX * 0.52, BOX * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();
    // soft shine
    ctx.fillStyle = "rgba(245,225,255,0.45)";
    ctx.beginPath();
    ctx.ellipse(-2, -3.5, BOX * 0.28, BOX * 0.16, 0, 0, Math.PI * 2);
    ctx.fill();

    // forked tongue (only while the snake is moving), flicking in and out
    if (!(direction.x === 0 && direction.y === 0)) {
      const flick = (Math.sin(frame * 0.15) + 1) / 2;    // 0..1
      const base = BOX * 0.72;
      const len = BOX * 0.45 + flick * BOX * 0.5;
      ctx.strokeStyle = "#d50000";
      ctx.lineWidth = 1.3;
      ctx.beginPath();
      ctx.moveTo(base, 0);
      ctx.lineTo(base + len * 0.6, 0);                   // stem
      ctx.moveTo(base + len * 0.6, 0);
      ctx.lineTo(base + len, -2.6);                      // fork
      ctx.moveTo(base + len * 0.6, 0);
      ctx.lineTo(base + len, 2.6);
      ctx.stroke();
    }

    // eyes with vertical slit pupils
    const eyeX = BOX * 0.28, eyeY = BOX * 0.30;
    for (const side of [-1, 1]) {
      ctx.fillStyle = "#fdd835";                         // yellow snake eye
      ctx.beginPath();
      ctx.arc(eyeX, eyeY * side, 2.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#150018";                         // slit pupil
      ctx.beginPath();
      ctx.ellipse(eyeX, eyeY * side, 0.9, 2.1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.95)";          // glint
      ctx.beginPath();
      ctx.arc(eyeX - 0.9, eyeY * side - 0.9, 0.7, 0, Math.PI * 2);
      ctx.fill();
    }

    // nostrils near the front of the snout
    ctx.fillStyle = "rgba(25,0,35,0.65)";
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(BOX * 0.6, 1.6 * side, 0.7, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  // ----- Draw a raspberry inside one grid square -----
  // A raspberry is a little cluster of round bumps (called drupelets)
  // with a small green leafy top.
  function drawRaspberry(px, py) {
    const cx = px + BOX / 2;       // center of the square (across)
    const cy = py + BOX / 2 + 1;   // center, nudged down for the leaves

    // the little bumps that make up the berry
    const drupelets = [
      [-3, -4], [0, -4], [3, -4],
      [-4.5, -0.5], [-1.5, -0.5], [1.5, -0.5], [4.5, -0.5],
      [-3, 3], [0, 3], [3, 3],
      [0, 6],
    ];
    for (const [dx, dy] of drupelets) {
      // the bump
      ctx.fillStyle = "#c2185b";
      ctx.beginPath();
      ctx.arc(cx + dx, cy + dy, 2.8, 0, Math.PI * 2);
      ctx.fill();
      // a tiny shine to make it look round and juicy
      ctx.fillStyle = "#f06292";
      ctx.beginPath();
      ctx.arc(cx + dx - 0.8, cy + dy - 0.8, 1, 0, Math.PI * 2);
      ctx.fill();
    }

    // the green leafy top
    ctx.fillStyle = "#43a047";
    const top = cy - 6;
    leaf(cx, top - 3.5, cx, top, 1.6);            // middle leaf, pointing up
    leaf(cx - 3.5, top - 2, cx - 0.5, top, 1.3);  // left leaf
    leaf(cx + 3.5, top - 2, cx + 0.5, top, 1.3);  // right leaf
  }

  // Helper: draw a small leaf as a triangle from a base point to a tip.
  function leaf(tipX, tipY, baseX, baseY, w) {
    const angle = Math.atan2(tipY - baseY, tipX - baseX);
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(baseX + Math.cos(angle + Math.PI / 2) * w,
               baseY + Math.sin(angle + Math.PI / 2) * w);
    ctx.lineTo(baseX + Math.cos(angle - Math.PI / 2) * w,
               baseY + Math.sin(angle - Math.PI / 2) * w);
    ctx.closePath();
    ctx.fill();
  }

  // ----- Draw the one special RAINBOW strawberry (worth 50 points) -----
  // A strawberry shape (rounded shoulders, pointed bottom) filled with a
  // shifting rainbow, dotted with seeds and topped with a green leafy crown.
  function drawStrawberry(px, py) {
    const cx = px + BOX / 2;
    const cy = py + BOX / 2 + 1;
    const w = BOX * 0.42;   // half the berry's width
    const h = BOX * 0.46;   // half the berry's height

    // berry body: rounded shoulders at the top, a point at the bottom
    ctx.beginPath();
    ctx.moveTo(cx, cy + h);                                                  // bottom tip
    ctx.bezierCurveTo(cx + w, cy + h * 0.35, cx + w, cy - h * 0.7, cx, cy - h * 0.55);
    ctx.bezierCurveTo(cx - w, cy - h * 0.7, cx - w, cy + h * 0.35, cx, cy + h);
    ctx.closePath();

    // fill it with a shifting rainbow gradient
    const grad = ctx.createLinearGradient(cx - w, cy - h, cx + w, cy + h);
    const hue0 = (frame * 3) % 360;
    for (let s = 0; s <= 1; s += 0.2) {
      grad.addColorStop(s, `hsl(${(hue0 + s * 300) % 360}, 95%, 55%)`);
    }
    ctx.fillStyle = grad;
    ctx.fill();

    // a soft shine
    ctx.fillStyle = "rgba(255,255,255,0.40)";
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.3, cy - h * 0.15, w * 0.22, h * 0.3, -0.4, 0, Math.PI * 2);
    ctx.fill();

    // little seeds dotted over the berry
    ctx.fillStyle = "rgba(255,255,240,0.9)";
    const seeds = [
      [-3, -3], [2, -4], [4, -0.5], [-4, 0], [0, -1.5],
      [-2, 3], [3, 2.5], [1, 4.5], [-1, 1.5],
    ];
    for (const [sx, sy] of seeds) {
      ctx.beginPath();
      ctx.ellipse(cx + sx, cy + sy, 0.7, 1.1, 0.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // green leafy crown on top
    ctx.fillStyle = "#43a047";
    const topY = cy - h * 0.5;
    leaf(cx, topY - 5, cx, topY, 2.0);             // middle, pointing up
    leaf(cx - 4.5, topY - 3, cx - 1, topY, 1.8);   // upper-left
    leaf(cx + 4.5, topY - 3, cx + 1, topY, 1.8);   // upper-right
    leaf(cx - 6.5, topY + 1, cx - 1.5, topY, 1.6); // left
    leaf(cx + 6.5, topY + 1, cx + 1.5, topY, 1.6); // right
  }

  // ----- Make the snake explode into flying pieces -----
  function explode(x, y) {
    exploded = true;
    particles = [];
    const colors = ["#9c27b0", "#ab47bc", "#ce93d8", "#fdd835", "#ffffff", "#d50000"];
    for (let i = 0; i < 80; i++) {
      const angle = Math.random() * Math.PI * 2;     // fly off in every direction
      const speed = 1 + Math.random() * 6;
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,             // a little upward kick
        size: 2 + Math.random() * 5,
        life: 1,                                     // 1 = brand new, 0 = gone
        color: colors[Math.floor(Math.random() * colors.length)],
      });
    }
  }

  // move and fade every piece of the explosion (called once per frame)
  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.18;        // gravity pulls the pieces down
      p.vx *= 0.99;        // a little air drag
      p.life -= 0.018;     // slowly fade away
    }
    particles = particles.filter(p => p.life > 0);   // remove finished pieces
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function endGame() {
    gameOver = true;
    messageEl.textContent = "Game Over! Press Space to play again.";
  }

  // ----- Start! -----
  resetGame();
  requestAnimationFrame(loop);   // smooth ~60fps render loop drives the game
</script>
</body>
</html>
