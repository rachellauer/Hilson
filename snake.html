<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🐔 Chicken Game</title>
<style>
  /* Make everything sit in the middle of the page with a fun background. */
  body {
    background: #1e2a38;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }
  h1 { margin-bottom: 5px; }
  /* The game board. We draw the snake and apple inside this canvas. */
  canvas {
    background: #0f1722;
    border: 4px solid #4caf50;
    border-radius: 8px;
  }
  #message { font-size: 20px; height: 24px; margin-top: 10px; }
</style>
</head>
<body>

  <!-- STEP 6: show the score at the top of the screen. -->
  <h1>🐔 Chicken</h1>
  <div>
    <span id="score">Score: 0</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    <span id="highscore">🏆 Best: 0</span>
  </div>

  <!-- STEP 1: the game window (a grid for the snake to move around in). -->
  <canvas id="board" width="400" height="400"></canvas>

  <div id="message">Press an arrow key to start!</div>

<script>
  // ---- Setting up the board ----
  const canvas = document.getElementById("board");
  const ctx = canvas.getContext("2d");

  const BOX = 20;                 // each square is 20 x 20 pixels
  const TILES = canvas.width / BOX; // how many squares fit across (20)

  // STEP 2: the snake starts in the middle. It is a list of squares.
  // The first square in the list is the head.
  let snake = [{ x: 10, y: 10 }];

  // Which way the snake is moving. It starts still until a key is pressed.
  let dx = 0;
  let dy = 0;

  // STEP 4: the bird seed! We scatter several pieces around the board.
  const SEED_COUNT = 11;   // 1 to start + 10 more = lots of snacks for the chicken
  let seeds = [];
  while (seeds.length < SEED_COUNT) {
    seeds.push(randomSeed());
  }
  makeOneSeedGolden();   // pick one lucky seed to be golden ✨

  // Turn exactly one of the seeds golden (and make sure the rest are normal).
  function makeOneSeedGolden() {
    for (const s of seeds) s.golden = false;
    const i = Math.floor(Math.random() * seeds.length);
    seeds[i].golden = true;
  }

  // The chicks the chicken lays. Each one is an obstacle the chicken must avoid!
  let chicks = [];

  // Find a random square that is empty — not on the chicken, a seed, or a chick.
  function randomEmptySpot() {
    let spot;
    let occupied = true;
    while (occupied) {
      spot = randomSeed();
      occupied = false;
      for (const part of snake)  if (part.x === spot.x && part.y === spot.y) occupied = true;
      for (const s of seeds)     if (s.x === spot.x && s.y === spot.y)       occupied = true;
      for (const c of chicks)    if (c.x === spot.x && c.y === spot.y)       occupied = true;
    }
    return spot;
  }

  let score = 0;
  let gameOver = false;

  // How many more squares the chicken still needs to grow. A normal seed adds 1,
  // and the golden seed adds 3!
  let growth = 0;

  // A REAL snake photo (transparent PNG) used for the game-over scene where a
  // snake comes and eats the raw meat. We start loading it now so it's ready.
  const snakeImg = new Image();
  let snakeImgReady = false;
  snakeImg.onload = function () { snakeImgReady = true; };
  snakeImg.src = "https://upload.wikimedia.org/wikipedia/commons/5/52/Coronella_austriaca_female_transparent_2.png";

  // ---- Remembering scores from past games ----
  // localStorage is a little box the browser keeps even after you refresh.
  // We store ALL past scores as a list, so we remember every game.
  let allScores = JSON.parse(localStorage.getItem("snakeScores") || "[]");

  // Show the best score we have saved so far (or 0 if there are none yet).
  function showHighScore() {
    const best = allScores.length > 0 ? Math.max(...allScores) : 0;
    document.getElementById("highscore").textContent = "🏆 Best: " + best;
  }
  showHighScore();

  // Pick a random square on the grid for a piece of bird seed.
  function randomSeed() {
    return {
      x: Math.floor(Math.random() * TILES),
      y: Math.floor(Math.random() * TILES)
    };
  }

  // STEP 3: steer the snake with the arrow keys.
  document.addEventListener("keydown", function (event) {
    if (event.key === "ArrowUp"    && dy === 0) { dx = 0;  dy = -1; }
    if (event.key === "ArrowDown"  && dy === 0) { dx = 0;  dy = 1;  }
    if (event.key === "ArrowLeft"  && dx === 0) { dx = -1; dy = 0;  }
    if (event.key === "ArrowRight" && dx === 0) { dx = 1;  dy = 0;  }
  });

  // The main game loop. This runs over and over to move the snake.
  function gameLoop() {
    if (gameOver) return;

    // If no arrow key has been pressed yet, the snake stays still and waits.
    // (This stops the game from thinking the snake crashed into itself at the start.)
    if (dx === 0 && dy === 0) return;

    // Figure out where the head will go next.
    const head = { x: snake[0].x + dx, y: snake[0].y + dy };

    // STEP 7: end the game if the snake hits a wall...
    if (head.x < 0 || head.x >= TILES || head.y < 0 || head.y >= TILES) {
      return endGame();
    }
    // ...or runs into its own body.
    for (let i = 0; i < snake.length; i++) {
      if (head.x === snake[i].x && head.y === snake[i].y) {
        return endGame();
      }
    }
    // ...but if it runs into one of its chicks, the chick does NOT end the game.
    // Instead the chick grows up and joins the flock — adding a chicken! 🐔
    for (let i = 0; i < chicks.length; i++) {
      if (head.x === chicks[i].x && head.y === chicks[i].y) {
        growth += 1;                  // the new chicken makes the trail one longer
        score++;                      // and adds a point
        document.getElementById("score").textContent = "Score: " + score;
        chicks.splice(i, 1);          // remove the chick that grew up
        break;
      }
    }

    // Add the new head to the front of the snake.
    snake.unshift(head);

    // Did the chicken eat a piece of bird seed?
    // Look through all the seeds to see if the head landed on one.
    for (let i = 0; i < seeds.length; i++) {
      if (head.x === seeds[i].x && head.y === seeds[i].y) {
        score++;
        document.getElementById("score").textContent = "Score: " + score;
        // The chicken lays a chick! It stays on the board as an obstacle. 🐤
        chicks.push(randomEmptySpot());

        if (seeds[i].golden) {
          // STEP 5 (CORRECTED!): the GOLDEN seed makes the chicken 3 squares LONGER!
          growth += 3;
          seeds[i] = randomSeed();   // replace the eaten golden seed...
          makeOneSeedGolden();       // ...and pick a brand new golden seed.
        } else {
          // A normal seed makes the chicken 1 square LONGER.
          growth += 1;
          seeds[i] = randomSeed();
        }
        break;
      }
    }

    // If the chicken still has growing to do, keep the tail (it gets longer).
    // Otherwise remove the tail so it stays the same length as it moves.
    if (growth > 0) {
      growth--;
    } else {
      snake.pop();
    }

    draw();
  }

  // Clear the board and draw the grid lines.
  // Used by the normal game AND by the run-away animation.
  function clearAndDrawGrid() {
    ctx.fillStyle = "#0f1722";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "#5b7aa6";
    ctx.lineWidth = 1.5;
    for (let i = 0; i <= TILES; i++) {
      // vertical lines
      ctx.beginPath();
      ctx.moveTo(i * BOX, 0);
      ctx.lineTo(i * BOX, canvas.height);
      ctx.stroke();
      // horizontal lines
      ctx.beginPath();
      ctx.moveTo(0, i * BOX);
      ctx.lineTo(canvas.width, i * BOX);
      ctx.stroke();
    }
  }

  // Draw a single oval "grain" of seed at a spot, turned to an angle.
  function drawGrain(cx, cy, angle, len, wid, fill, stroke) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(0, 0, len, wid, 0, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = stroke;
    ctx.stroke();
    ctx.restore();
  }

  // Draw one piece of bird seed. A normal piece is a little cluster of grains;
  // the golden piece is a single shiny gold grain.
  function drawOneSeed(seed) {
    const cx = seed.x * BOX + BOX / 2;
    const cy = seed.y * BOX + BOX / 2;
    if (seed.golden) {
      drawGrain(cx, cy, -0.5, BOX * 0.34, BOX * 0.18, "#ffd54a", "#b8860b");
      // a shiny white highlight to make it look golden ✨
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.beginPath();
      ctx.arc(cx - BOX * 0.08, cy - BOX * 0.07, BOX * 0.05, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // three small grains clustered together, like real scattered seed
      drawGrain(cx - BOX * 0.13, cy + BOX * 0.04,  0.5, BOX * 0.18, BOX * 0.09, "#d9b673", "#9c7434");
      drawGrain(cx + BOX * 0.12, cy - BOX * 0.09, -0.7, BOX * 0.17, BOX * 0.09, "#c9a35e", "#8a6329");
      drawGrain(cx + BOX * 0.04, cy + BOX * 0.13,  1.2, BOX * 0.16, BOX * 0.08, "#e0c089", "#9c7434");
    }
  }

  // Draw all the bird seed on the board.
  function drawSeeds() {
    for (const seed of seeds) drawOneSeed(seed);
  }

  // Draw everything on the board.
  function draw() {
    // Clear the board and draw the grid.
    clearAndDrawGrid();

    // Draw each chick the chicken has laid. 🐤
    ctx.font = (BOX - 2) + "px Arial";
    ctx.textBaseline = "top";
    for (const c of chicks) {
      ctx.fillText("🐤", c.x * BOX, c.y * BOX);
    }

    // STEP 2: draw the chicken!
    // Each body block is a baby chick 🐤 that follows along behind the head.
    ctx.font = (BOX - 2) + "px Arial";
    ctx.textBaseline = "top";
    for (let i = 1; i < snake.length; i++) {
      ctx.fillText("🐤", snake[i].x * BOX, snake[i].y * BOX);
    }
    // ...and the head is the mother chicken. 🐔
    ctx.fillText("🐔", snake[0].x * BOX, snake[0].y * BOX);

    // STEP 4: draw every piece of bird seed (clusters of grains; golden one shines ✨).
    drawSeeds();
  }

  function endGame() {
    gameOver = true;

    // Save this game's score to our list, then write the whole list back
    // into the browser's storage box so it is remembered after a refresh.
    allScores.push(score);
    localStorage.setItem("snakeScores", JSON.stringify(allScores));
    showHighScore();

    document.getElementById("message").textContent =
      "Game Over! The chicken is now raw meat 🥩, the chicks are running away 🐤💨, and a hungry snake 🐍 is coming... Final score: " + score +
      ". You have played " + allScores.length + " games. Refresh to play again.";

    // When the chicken crashes, all the chicks panic and run away!
    startChicksRunAway();
  }

  // Make every chick scatter off the screen in a random direction.
  function startChicksRunAway() {
    // Gather every chick: the ones laid on the board PLUS the chicken's body chicks.
    const runaways = [];
    for (const c of chicks) runaways.push(makeRunaway(c));
    for (let i = 1; i < snake.length; i++) runaways.push(makeRunaway(snake[i]));

    // Where the raw meat sits (the square where the chicken crashed).
    const meatX = snake[0].x * BOX;
    const meatY = snake[0].y * BOX;
    let meatEaten = false;

    // A hungry snake shows up 5 seconds later to eat the meat.
    const STEP_MS = 60;       // the timer runs every 60 milliseconds
    let elapsed = 0;          // how much time has passed (in milliseconds)
    let snakeShown = false;
    let snakeX = -BOX * 2;    // the snake starts just off the left edge
    const snakeY = meatY;     // it slides along the meat's row

    const runTimer = setInterval(function () {
      elapsed += STEP_MS;

      // Move each chick in its run-away direction, and let it get older.
      for (const r of runaways) {
        r.px += r.vx;
        r.py += r.vy;
        r.age++;
      }

      // After 5 seconds (5000 ms), a hungry snake slides in from the left.
      if (elapsed >= 5000) snakeShown = true;
      if (snakeShown) {
        snakeX += 6;                          // slither to the right
        if (!meatEaten && snakeX >= meatX) {
          meatEaten = true;                   // gulp! the snake eats the raw meat
        }
      }

      // ---- draw the scene ----
      clearAndDrawGrid();
      drawSeeds();
      ctx.font = (BOX - 2) + "px Arial";
      ctx.textBaseline = "top";
      // The raw meat 🥩 — shown until the snake eats it.
      if (!meatEaten) ctx.fillText("🥩", meatX, meatY);
      // Baby chicks 🐤 that grow into chickens 🐔 as they run.
      for (const r of runaways) {
        ctx.fillText(r.age >= r.growUpAt ? "🐔" : "🐤", r.px, r.py);
      }
      // The hungry snake. Use the REAL photo once it has downloaded; until then,
      // fall back to the hand-drawn snake so something always shows.
      if (snakeShown) {
        if (snakeImgReady) {
          const size = BOX * 6;   // how big the snake photo is on screen
          ctx.drawImage(snakeImg, snakeX - size * 0.7, snakeY + BOX / 2 - size / 2, size, size);
        } else {
          drawRealisticSnake(snakeX, snakeY, elapsed / 120);
        }
      }

      // Stop once the snake has eaten the meat and slithered off the screen.
      if (meatEaten && snakeX > canvas.width + BOX * 6) clearInterval(runTimer);
    }, 60);
  }

  // Give a chick a random run-away speed and direction (in pixels per step).
  function makeRunaway(cell) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 4;
    return {
      px: cell.x * BOX,
      py: cell.y * BOX,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      age: 0,                         // how many steps it has been running
      growUpAt: 4 + Math.random() * 8 // when this chick turns into an adult chicken
    };
  }

  // Has this chick run past the edge of the board?
  function isOffScreen(r) {
    return r.px < -BOX || r.px > canvas.width || r.py < -BOX || r.py > canvas.height;
  }

  // Draw an ULTRA-realistic slithering snake, head at (headX, headY), body
  // trailing left. "phase" animates the slither, scales, and tongue flick.
  function drawRealisticSnake(headX, headY, phase) {
    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    const len = BOX * 9, amp = BOX * 0.6, waves = 1.9, steps = 80;

    // 1) Centerline points + the sideways "normal" direction at each one.
    const C = [];
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const x = headX - t * len;
      const y = headY + BOX / 2 +
                Math.sin(phase + t * waves * Math.PI * 2) * amp * (1 - t * 0.4);
      C.push({ x: x, y: y, t: t });
    }
    for (let i = 0; i <= steps; i++) {
      const a = C[Math.max(0, i - 1)], b = C[Math.min(steps, i + 1)];
      let tx = b.x - a.x, ty = b.y - a.y;
      const m = Math.hypot(tx, ty) || 1; tx /= m; ty /= m;
      C[i].nx = -ty; C[i].ny = tx; C[i].ang = Math.atan2(ty, tx);
    }
    function widthAt(t) { return BOX * (0.16 + 0.55 * Math.pow(1 - t, 0.75)); }

    // Trace the closed outline of the whole body.
    function bodyPath() {
      ctx.beginPath();
      for (let i = 0; i <= steps; i++) {
        const p = C[i], w = widthAt(p.t) / 2;
        const x = p.x + p.nx * w, y = p.y + p.ny * w;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      for (let i = steps; i >= 0; i--) {
        const p = C[i], w = widthAt(p.t) / 2;
        ctx.lineTo(p.x - p.nx * w, p.y - p.ny * w);
      }
      ctx.closePath();
    }

    // 2) Soft drop shadow on the ground.
    ctx.save();
    ctx.translate(3, 6);
    ctx.fillStyle = "rgba(0,0,0,0.22)";
    bodyPath();
    ctx.fill();
    ctx.restore();

    // 3) Dark base fill — this shows through as the gaps between the scales.
    bodyPath();
    ctx.fillStyle = "#16331a";
    ctx.fill();

    // 4) Cover the body with hundreds of little shaded, overlapping scales.
    ctx.save();
    bodyPath();
    ctx.clip();

    function lerp(a, b, k) { return a + (b - a) * k; }
    // A scale's colour depends on where it sits across the body (rounded-tube
    // shading: bright in the middle, dark at the edges) and on the snake's
    // dark "saddle" pattern running down its length.
    function scaleColor(u, t) {
      const L = 1 - 0.7 * u * u;                          // tube shading
      const saddle = Math.sin(t * waves * Math.PI * 4) > 0.35; // dark blotches
      let r, g, b;
      if (saddle) { r = lerp(28, 66, L); g = lerp(48, 92, L); b = lerp(24, 44, L); }
      else        { r = lerp(70, 150, L); g = lerp(120, 214, L); b = lerp(55, 118, L); }
      return "rgb(" + (r | 0) + "," + (g | 0) + "," + (b | 0) + ")";
    }

    const scaleStep = 3, cols = 9;
    for (let i = 0; i <= steps; i += scaleStep) {
      const p = C[i], w = widthAt(p.t);
      const sr = Math.max(1.4, (w / cols) * 1.05);        // scale size
      const stagger = ((i / scaleStep) % 2) ? (1 / (cols - 1)) : 0; // brick offset
      for (let c = 0; c < cols; c++) {
        const u = (c / (cols - 1)) * 2 - 1 + stagger;     // -1..1 across body
        if (u < -1.05 || u > 1.05) continue;
        const x = p.x + p.nx * (u * w / 2);
        const y = p.y + p.ny * (u * w / 2);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(p.ang);
        ctx.beginPath();
        ctx.ellipse(0, 0, sr * 0.95, sr * 0.7, 0, 0, Math.PI * 2);
        ctx.fillStyle = scaleColor(u, p.t);
        ctx.fill();
        ctx.restore();
      }
    }

    // 5) A glossy sheen running just above the centerline.
    ctx.globalAlpha = 0.22;
    ctx.strokeStyle = "#eaffea";
    ctx.lineWidth = BOX * 0.12;
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const p = C[i], off = -0.3 * widthAt(p.t) / 2;
      const x = p.x + p.nx * off, y = p.y + p.ny * off;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore(); // remove clip

    // 6) The head — a bezier shape with its own gradient, facing forward.
    const h = C[0], hb = C[1];
    let dx = h.x - hb.x, dy = h.y - hb.y;
    const dm = Math.hypot(dx, dy) || 1; dx /= dm; dy /= dm;
    const nx = -dy, ny = dx;
    const snout = BOX * 0.85, hw = BOX * 0.46;

    ctx.save();
    ctx.translate(h.x + dx * snout * 0.25, h.y + dy * snout * 0.25);
    ctx.rotate(Math.atan2(dy, dx));
    const hg = ctx.createLinearGradient(0, -hw, 0, hw);
    hg.addColorStop(0, "#2f6b2f");
    hg.addColorStop(0.5, "#4ca64c");
    hg.addColorStop(1, "#7cc97c");
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.moveTo(snout, 0);                                   // snout tip
    ctx.bezierCurveTo(snout * 0.6, -hw, -snout * 0.6, -hw, -snout, -hw * 0.5);
    ctx.bezierCurveTo(-snout * 1.15, 0, -snout * 1.15, 0, -snout, hw * 0.5);
    ctx.bezierCurveTo(-snout * 0.6, hw, snout * 0.6, hw, snout, 0);
    ctx.closePath();
    ctx.fill();
    // mouth line
    ctx.strokeStyle = "rgba(0,0,0,0.4)";
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(snout, 0);
    ctx.lineTo(-snout * 0.7, hw * 0.18);
    ctx.stroke();
    ctx.restore();

    // nostril
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.beginPath();
    ctx.arc(h.x + dx * snout * 0.78 + nx * hw * 0.32,
            h.y + dy * snout * 0.78 + ny * hw * 0.32, BOX * 0.035, 0, Math.PI * 2);
    ctx.fill();

    // 7) The eye — yellow iris, vertical slit pupil, and a white glint.
    const ex = h.x + dx * snout * 0.05 + nx * hw * 0.55;
    const ey = h.y + dy * snout * 0.05 + ny * hw * 0.55;
    ctx.fillStyle = "#f0c020";
    ctx.beginPath(); ctx.arc(ex, ey, BOX * 0.16, 0, Math.PI * 2); ctx.fill();
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(Math.atan2(dy, dx));
    ctx.fillStyle = "black";
    ctx.beginPath(); ctx.ellipse(0, 0, BOX * 0.035, BOX * 0.14, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.beginPath(); ctx.arc(ex - BOX * 0.04, ey - BOX * 0.05, BOX * 0.04, 0, Math.PI * 2); ctx.fill();

    // 8) The forked tongue — a wavy red flick that shoots in and out.
    const flick = Math.sin(phase * 3) * 0.5 + 0.5;
    const bx = h.x + dx * snout, by = h.y + dy * snout;
    const tlen = BOX * (0.3 + flick * 0.7);
    const tx = bx + dx * tlen, ty = by + dy * tlen;
    const wiggle = Math.sin(phase * 6) * BOX * 0.06;
    ctx.strokeStyle = "#d32f2f";
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(bx + dx * tlen * 0.5 + nx * wiggle,
                         by + dy * tlen * 0.5 + ny * wiggle, tx, ty);
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx + dx * BOX * 0.14 + nx * BOX * 0.12, ty + dy * BOX * 0.14 + ny * BOX * 0.12);
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx + dx * BOX * 0.14 - nx * BOX * 0.12, ty + dy * BOX * 0.14 - ny * BOX * 0.12);
    ctx.stroke();

    ctx.restore();
  }

  // Run the game loop about 8 times per second. A bigger number = faster snake.
  setInterval(gameLoop, 125);
  draw();
</script>
</body>
</html>
